<!DOCTYPE html>
<html>
<head>
    <title>Login - Chitara</title>
    <style>
        body { font-family: Arial; max-width: 400px; margin: 100px auto; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <h2>Login to Chitara</h2>
    {% if form.non_field_errors %}
        <div style="color: red;">{{ form.non_field_errors }}</div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Username:</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label>Password:</label>
            {{ form.password }}
        </div>
        <button type="submit">Login</button>
    </form>
    
    <p>Don't have an account? <a href="/admin/">Use admin panel</a></p>
</body>
</html>
```
