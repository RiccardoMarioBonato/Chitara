{% extends "base.html" %}

{% block title %}Sign Out — Chitara{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-6 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-header text-center fw-semibold fs-5">Sign Out</div>
      <div class="card-body p-4 text-center">

        <p class="text-muted mb-4">Are you sure you want to sign out?</p>

        <form method="post" action="{% url 'account_logout' %}">
          {% csrf_token %}
          {{ redirect_field }}
          <div class="d-flex gap-2 justify-content-center">
            <button type="submit" class="btn btn-danger px-4">Sign Out</button>
            <a href="{% url 'music:song-library' %}" class="btn btn-outline-secondary px-4">Cancel</a>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>
{% endblock %}
